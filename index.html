<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QUIZEE by FINN</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #4f46e5;
      --primary-dark: #3730a3;
      --primary-light: #e0e7ff;
      --success: #16a34a;
      --success-light: #dcfce7;
      --danger: #dc2626;
      --danger-light: #fee2e2;
      --warning: #d97706;
      --warning-light: #fef3c7;
      --gray-50: #f9fafb;
      --gray-100: #f3f4f6;
      --gray-200: #e5e7eb;
      --gray-400: #9ca3af;
      --gray-500: #6b7280;
      --gray-700: #374151;
      --gray-900: #111827;
      --radius: 12px;
      --shadow: 0 4px 6px -1px rgba(0,0,0,.08), 0 2px 4px -2px rgba(0,0,0,.06);
      --shadow-lg: 0 10px 25px -5px rgba(0,0,0,.12), 0 8px 10px -6px rgba(0,0,0,.08);
    }

    body {
      font-family: 'Inter', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    /* ── OVERLAY ── */
    #overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.55);
      backdrop-filter: blur(6px);
      z-index: 9999;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    #overlay-content {
      background: white;
      padding: 40px 36px;
      border-radius: 20px;
      width: 340px;
      text-align: center;
      box-shadow: var(--shadow-lg);
      animation: slideUp .3s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
    .overlay-logo {
      font-size: 28px;
      font-weight: 700;
      color: var(--primary);
      letter-spacing: -0.5px;
      margin-bottom: 4px;
    }
    .overlay-logo span { color: var(--gray-400); font-weight: 400; font-size: 14px; }
    #overlay-content h3 {
      font-size: 18px;
      font-weight: 600;
      color: var(--gray-900);
      margin: 20px 0 8px;
    }
    #overlay-content p.sub {
      font-size: 13px;
      color: var(--gray-500);
      margin-bottom: 20px;
    }
    #student-id {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid var(--gray-200);
      border-radius: 10px;
      font-size: 15px;
      font-family: inherit;
      outline: none;
      transition: border-color .2s;
      text-align: center;
      letter-spacing: 1px;
    }
    #student-id:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-light); }
    #overlay-content button {
      margin-top: 14px;
      width: 100%;
      padding: 12px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background .2s, transform .1s;
    }
    #overlay-content button:hover  { background: var(--primary-dark); }
    #overlay-content button:active { transform: scale(.98); }
    #student-msg {
      color: var(--danger);
      font-size: 13px;
      margin-top: 12px;
      min-height: 18px;
    }

    /* ── QUIZ CARD ── */
    .quiz-container {
      background: white;
      border-radius: 20px;
      box-shadow: var(--shadow-lg);
      width: 660px;
      max-width: 100%;
      max-height: 92vh;
      overflow-y: auto;
      display: none;
      animation: slideUp .35s ease;
      scrollbar-width: thin;
      scrollbar-color: var(--gray-200) transparent;
    }
    .quiz-container::-webkit-scrollbar { width: 6px; }
    .quiz-container::-webkit-scrollbar-track { background: transparent; }
    .quiz-container::-webkit-scrollbar-thumb { background: var(--gray-200); border-radius: 99px; }

    /* Header */
    .quiz-header {
      background: linear-gradient(135deg, var(--primary) 0%, #7c3aed 100%);
      padding: 22px 28px 18px;
      border-radius: 20px 20px 0 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .quiz-brand {
      font-size: 22px;
      font-weight: 700;
      color: white;
      letter-spacing: -0.5px;
    }
    .quiz-brand span { opacity: .6; font-weight: 400; font-size: 13px; margin-left: 6px; }
    #greeting {
      font-size: 13px;
      color: rgba(255,255,255,.8);
      background: rgba(255,255,255,.15);
      padding: 5px 12px;
      border-radius: 99px;
    }

    /* Body */
    .quiz-body { padding: 24px 28px; }

    /* Toolbar */
    #upload-container {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    #subject-select {
      flex: 1;
      padding: 10px 14px;
      border: 1.5px solid var(--gray-200);
      border-radius: 10px;
      font-size: 14px;
      font-family: inherit;
      color: var(--gray-700);
      background: white;
      outline: none;
      cursor: pointer;
      transition: border-color .2s;
    }
    #subject-select:focus { border-color: var(--primary); }
    #shuffle-button {
      padding: 10px 16px;
      border: 1.5px solid var(--gray-200);
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      background: white;
      color: var(--gray-700);
      transition: border-color .2s, background .2s;
      white-space: nowrap;
    }
    #shuffle-button:hover { border-color: var(--primary); background: var(--primary-light); color: var(--primary); }

    /* Progress */
    .progress-bar-wrap {
      margin-bottom: 20px;
    }
    .progress-meta {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--gray-500);
      margin-bottom: 6px;
    }
    .progress-meta strong { color: var(--gray-700); }
    .progress-track {
      height: 6px;
      background: var(--gray-100);
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), #7c3aed);
      border-radius: 99px;
      transition: width .4s ease;
      width: 0%;
    }

    /* Question */
    #question-text {
      font-size: 16px;
      font-weight: 600;
      color: var(--gray-900);
      line-height: 1.6;
      margin-bottom: 18px;
      padding: 18px 20px;
      background: var(--gray-50);
      border-radius: var(--radius);
      border-left: 4px solid var(--primary);
    }

    /* Answers */
    #answers { list-style: none; display: flex; flex-direction: column; gap: 10px; }
    #answers li {
      padding: 13px 16px;
      background: white;
      border: 1.5px solid var(--gray-200);
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 14px;
      color: var(--gray-700);
      line-height: 1.5;
      transition: border-color .2s, background .2s, transform .1s;
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }
    #answers li::before {
      content: attr(data-label);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 26px;
      height: 26px;
      border-radius: 50%;
      background: var(--gray-100);
      color: var(--gray-500);
      font-size: 12px;
      font-weight: 600;
      flex-shrink: 0;
      transition: background .2s, color .2s;
    }
    #answers li:hover {
      border-color: var(--primary);
      background: var(--primary-light);
      transform: translateX(2px);
    }
    #answers li:hover::before { background: var(--primary); color: white; }
    .correct {
      background: var(--success-light) !important;
      border-color: var(--success) !important;
      color: var(--success) !important;
    }
    .correct::before { background: var(--success) !important; color: white !important; }
    .incorrect {
      background: var(--danger-light) !important;
      border-color: var(--danger) !important;
      color: var(--danger) !important;
    }
    .incorrect::before { background: var(--danger) !important; color: white !important; }
    .selected { font-weight: 500; }

    /* Nav buttons */
    .nav-row {
      display: flex;
      gap: 10px;
      margin-top: 22px;
    }
    #back-button, #next-button {
      flex: 1;
      padding: 12px;
      border: 1.5px solid var(--gray-200);
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all .2s;
    }
    #back-button { background: white; color: var(--gray-700); }
    #back-button:not(:disabled):hover { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }
    #next-button { background: var(--primary); color: white; border-color: var(--primary); }
    #next-button:not(:disabled):hover { background: var(--primary-dark); }
    #back-button:disabled, #next-button:disabled {
      opacity: .4;
      cursor: not-allowed;
    }

    /* Submit */
    #submit-button {
      width: 100%;
      padding: 13px;
      margin-top: 12px;
      background: var(--danger);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background .2s, transform .1s;
    }
    #submit-button:hover:not(:disabled)  { background: #b91c1c; }
    #submit-button:active { transform: scale(.99); }
    #submit-button:disabled { background: var(--gray-200); color: var(--gray-400); cursor: not-allowed; }
    #submit-button.retry { background: var(--success); }
    #submit-button.retry:hover { background: #15803d; }

    /* Incorrect button */
    #incorrect-list-button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      background: white;
      color: var(--warning);
      border: 1.5px solid var(--warning);
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      display: none;
      transition: background .2s;
    }
    #incorrect-list-button:hover { background: var(--warning-light); }

    /* Result */
    #result-message {
      margin-top: 18px;
      padding: 16px 20px;
      border-radius: var(--radius);
      font-size: 15px;
      font-weight: 600;
      text-align: center;
      background: var(--primary-light);
      color: var(--primary-dark);
      display: none;
    }

    /* Incorrect list */
    #incorrect-list-container {
      margin-top: 16px;
      border: 1.5px solid var(--gray-200);
      border-radius: var(--radius);
      overflow: hidden;
      display: none;
    }
    .incorrect-header {
      padding: 12px 16px;
      background: var(--gray-50);
      font-size: 13px;
      font-weight: 600;
      color: var(--gray-700);
      border-bottom: 1px solid var(--gray-200);
    }
    #incorrect-list {
      list-style: none;
      max-height: 240px;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    #incorrect-list li {
      padding: 12px 14px;
      background: var(--danger-light);
      border: 1px solid #fca5a5;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      line-height: 1.5;
      transition: background .2s;
    }
    #incorrect-list li:hover { background: #fecaca; }
    #incorrect-list li .q-text { font-weight: 500; color: var(--gray-900); margin-bottom: 6px; }
    #incorrect-list li .answer { display: flex; align-items: flex-start; gap: 6px; margin-top: 3px; }
    #incorrect-list li .answer .label {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 99px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    #incorrect-list li .answer.wrong .label { background: #fca5a5; color: #7f1d1d; }
    #incorrect-list li .answer.right .label { background: #86efac; color: #14532d; }
  </style>
</head>
<body>

<!-- LOGIN OVERLAY -->
<div id="overlay">
  <div id="overlay-content">
    <div class="overlay-logo">QUIZEE <span>by FINN</span></div>
    <h3>Xác thực sinh viên</h3>
    <p class="sub">Nhập mã sinh viên để bắt đầu làm bài</p>
    <input type="text" id="student-id" placeholder="VD: 1234567890"
           onkeydown="if(event.key==='Enter') verifyStudent()" />
    <button onclick="verifyStudent()">Đăng nhập</button>
    <p id="student-msg"></p>
  </div>
</div>

<!-- QUIZ APP -->
<div class="quiz-container" id="quiz-app">
  <!-- Header -->
  <div class="quiz-header">
    <div class="quiz-brand">QUIZEE <span>by FINN</span></div>
    <div id="greeting"></div>
  </div>

  <!-- Body -->
  <div class="quiz-body">
    <!-- Toolbar -->
    <div id="upload-container">
      <select id="subject-select" onchange="loadSubjectFile(this.value)">
        <option value="">-- Chọn môn học --</option>
        <option value="kinhtechinhtri.txt">Kinh tế chính trị</option>
        <option value="chinhtrihoc.txt">Chính trị học</option>
        <option value="xahoihoc.txt">Xã hội học</option>
        <option value="quanhequocte.txt">Quan hệ quốc tế</option>
        <option value="khoahocchinhsachcong.txt">Khoa học chính sách công</option>
      </select>
      <button id="shuffle-button" onclick="shuffleQuestions()">⇄ Trộn câu</button>
    </div>

    <!-- Progress -->
    <div class="progress-bar-wrap">
      <div class="progress-meta">
        <span>Tiến độ</span>
        <strong><span id="question-count">0</span> / <span id="total-questions">0</span></strong>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
    </div>

    <!-- Question -->
    <div id="question-container">
      <h2 id="question-text">Vui lòng chọn môn học để bắt đầu.</h2>
      <ul id="answers">
        <li data-label="A" onclick="checkAnswer(this)"></li>
        <li data-label="B" onclick="checkAnswer(this)"></li>
        <li data-label="C" onclick="checkAnswer(this)"></li>
        <li data-label="D" onclick="checkAnswer(this)"></li>
      </ul>
    </div>

    <!-- Navigation -->
    <div class="nav-row">
      <button id="back-button" onclick="prevQuestion()" disabled>← Quay lại</button>
      <button id="next-button" onclick="nextQuestion()" disabled>Tiếp tục →</button>
    </div>

    <!-- Submit -->
    <button id="submit-button" onclick="submitQuiz()" disabled>Nộp bài</button>
    <button id="incorrect-list-button" onclick="showIncorrectQuestions()">⚠ Xem câu trả lời sai</button>

    <!-- Result -->
    <div id="result-message"></div>

    <!-- Incorrect list -->
    <div id="incorrect-list-container">
      <div class="incorrect-header">Các câu trả lời sai</div>
      <ul id="incorrect-list"></ul>
    </div>
  </div>
</div>

<script>
let currentQuestionIndex = 0;
let questions = [];
let originalQuestions = [];
let userAnswers = [];
let totalCorrectAnswers = 0;
let submitted = false;
let studentName = "";

function verifyStudent() {
  const inputId = document.getElementById("student-id").value.trim().toUpperCase();
  fetch("https://raw.githubusercontent.com/cuongphung89027/tracnghiem/main/sinhvien.txt")
    .then(res => res.text())
    .then(data => {
      const lines = data.split('\n').map(line => line.trim());
      for (const line of lines) {
        if (!line) continue;
        const hasAccess = line.startsWith("*");
        const cleanLine = hasAccess ? line.slice(1).trim() : line;
        const parts = cleanLine.split(/\s+/);
        const id = parts[0].toUpperCase();
        const name = parts.slice(1).join(" ");
        if (id === inputId) {
          if (!hasAccess) {
            document.getElementById("student-msg").innerText = `Xin chào ${name}, tài khoản chưa được cấp quyền truy cập.`;
            return;
          }
          studentName = name;
          document.getElementById("overlay").style.display = "none";
          document.getElementById("quiz-app").style.display = "block";
          document.getElementById("greeting").innerText = `Xin chào ${studentName}`;
          return;
        }
      }
      document.getElementById("student-msg").innerText = "Mã sinh viên không tồn tại trong hệ thống.";
    })
    .catch(() => {
      document.getElementById("student-msg").innerText = "Không thể tải danh sách sinh viên.";
    });
}

function loadSubjectFile(filename) {
  if (!filename) return;
  const url = `https://raw.githubusercontent.com/cuongphung89027/tracnghiem/main/${filename}`;
  fetch(url)
    .then(response => {
      if (!response.ok) throw new Error("Không thể tải file");
      return response.text();
    })
    .then(content => {
      parseQuestions(content);
      userAnswers = new Array(questions.length).fill(null);
      originalQuestions = JSON.parse(JSON.stringify(questions));
      currentQuestionIndex = 0;
      submitted = false;
      updateSubmitButton();
      document.getElementById('incorrect-list-button').style.display = 'none';
      document.getElementById('result-message').style.display = 'none';
      document.getElementById('result-message').innerText = '';
      document.getElementById('incorrect-list-container').style.display = 'none';
      showQuestion();
    })
    .catch(err => { alert("Lỗi tải file: " + err.message); });
}

function parseQuestions(content) {
  questions = [];
  const lines = content.split("\n");
  let currentQuestion = '';
  let answers = [];
  lines.forEach(line => {
    line = line.trim();
    if (!line) return;
    if (line.match(/^\d+\./)) {
      if (currentQuestion) questions.push({ question: currentQuestion, answers });
      currentQuestion = line;
      answers = [];
    } else {
      const isCorrect = line.startsWith("*");
      answers.push({ text: isCorrect ? line.slice(1).trim() : line.trim(), isCorrect });
    }
  });
  if (currentQuestion) questions.push({ question: currentQuestion, answers });
  document.getElementById('submit-button').disabled = questions.length === 0;
}

function showQuestion() {
  const question = questions[currentQuestionIndex];
  document.getElementById('question-text').innerText = question.question;
  const labels = ['A','B','C','D'];
  const answerItems = document.querySelectorAll("#answers li");
  answerItems.forEach((li, index) => {
    li.innerText = question.answers[index]?.text || "";
    li.setAttribute('data-label', labels[index] || '');
    li.className = "";
    if (userAnswers[currentQuestionIndex] === question.answers[index]?.text) {
      li.classList.add("selected");
    }
  });

  const curr = currentQuestionIndex + 1;
  const total = questions.length;
  document.getElementById("question-count").innerText = curr;
  document.getElementById("total-questions").innerText = total;
  document.getElementById("progress-fill").style.width = ((curr / total) * 100) + "%";

  document.getElementById("back-button").disabled = currentQuestionIndex === 0;
  document.getElementById("next-button").disabled = userAnswers[currentQuestionIndex] == null;
}

function checkAnswer(selected) {
  const answerItems = document.querySelectorAll("#answers li");
  answerItems.forEach(li => li.classList.remove("selected","correct","incorrect"));
  const question = questions[currentQuestionIndex];
  const correctAnswer = question.answers.find(a => a.isCorrect)?.text;
  selected.classList.add("selected");
  userAnswers[currentQuestionIndex] = selected.innerText;
  if (selected.innerText === correctAnswer) {
    selected.classList.add("correct");
  } else {
    selected.classList.add("incorrect");
    const correctLi = Array.from(answerItems).find(li => li.innerText === correctAnswer);
    if (correctLi) correctLi.classList.add("correct");
  }
  document.getElementById("next-button").disabled = false;
}

function nextQuestion() {
  if (currentQuestionIndex < questions.length - 1) {
    currentQuestionIndex++;
    showQuestion();
  }
}

function prevQuestion() {
  if (currentQuestionIndex > 0) {
    currentQuestionIndex--;
    showQuestion();
  }
}

function submitQuiz() {
  if (!submitted) {
    totalCorrectAnswers = questions.reduce((sum, question, index) => {
      const correctAnswer = question.answers.find(a => a.isCorrect)?.text;
      return sum + (userAnswers[index] === correctAnswer ? 1 : 0);
    }, 0);
    const percent = ((totalCorrectAnswers / questions.length) * 100).toFixed(1);
    const resultEl = document.getElementById("result-message");
    resultEl.style.display = "block";
    resultEl.innerText = `🎉 Bạn trả lời đúng ${totalCorrectAnswers}/${questions.length} câu — ${percent}%`;
    submitted = true;
    updateSubmitButton();
    document.getElementById("incorrect-list-button").style.display = "block";
    document.getElementById("incorrect-list-container").style.display = "none";

    const subjectDropdown = document.getElementById("subject-select");
    const subjectName = subjectDropdown.options[subjectDropdown.selectedIndex].text;
    const now = new Date();
    const data = {
      hoten: studentName,
      masv: document.getElementById("student-id").value.trim().toUpperCase(),
      ngay: now.toLocaleDateString('vi-VN'),
      gio: now.toLocaleTimeString('vi-VN'),
      monhoc: subjectName,
      diem: percent
    };
    fetch("https://script.google.com/macros/s/AKfycbwAcVo1YJL20H1AwzcPNH2y-ucIQjAcTgCIVktkomAof__Q6aLL87f1L0N8YeUe-s2DqA/exec", {
      method: "POST", mode: "no-cors",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data)
    });
  } else {
    questions = JSON.parse(JSON.stringify(originalQuestions));
    userAnswers = new Array(questions.length).fill(null);
    currentQuestionIndex = 0;
    submitted = false;
    updateSubmitButton();
    document.getElementById('result-message').style.display = 'none';
    document.getElementById('result-message').innerText = '';
    document.getElementById("incorrect-list-button").style.display = "none";
    document.getElementById("incorrect-list-container").style.display = "none";
    showQuestion();
  }
}

function updateSubmitButton() {
  const btn = document.getElementById("submit-button");
  if (submitted) {
    btn.innerText = "↺ Làm lại bài";
    btn.classList.add("retry");
  } else {
    btn.innerText = "Nộp bài";
    btn.classList.remove("retry");
  }
}

function showIncorrectQuestions() {
  const incorrectList = document.getElementById("incorrect-list");
  incorrectList.innerHTML = "";
  questions.forEach((question, index) => {
    const correctAnswer = question.answers.find(a => a.isCorrect)?.text;
    if (userAnswers[index] && userAnswers[index] !== correctAnswer) {
      const li = document.createElement("li");
      li.innerHTML = `
        <div class="q-text">${question.question}</div>
        <div class="answer wrong"><span class="label">Bạn chọn</span><span>${userAnswers[index]}</span></div>
        <div class="answer right"><span class="label">Đúng</span><span>${correctAnswer}</span></div>
      `;
      li.onclick = () => { currentQuestionIndex = index; showQuestion(); };
      incorrectList.appendChild(li);
    }
  });
  document.getElementById("incorrect-list-container").style.display = "block";
}

function shuffleQuestions() {
  if (questions.length === 0) return;
  for (let i = questions.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [questions[i], questions[j]] = [questions[j], questions[i]];
  }
  userAnswers = new Array(questions.length).fill(null);
  currentQuestionIndex = 0;
  submitted = false;
  updateSubmitButton();
  document.getElementById('result-message').style.display = 'none';
  document.getElementById('result-message').innerText = '';
  document.getElementById("incorrect-list-button").style.display = "none";
  document.getElementById("incorrect-list-container").style.display = "none";
  showQuestion();
}
</script>
</body>
</html>
